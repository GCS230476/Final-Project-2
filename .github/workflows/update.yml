name: Daily data update
on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas numpy yfinance fredapi cot_reports python-dotenv requests
      - run: python update_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      - run: |
          git config user.name "auto-update"
          git config user.email "auto@update"
          git add data/processed/fx_features_live.csv data/interim/fx_master_dataset.csv
          git diff --cached --quiet || git commit -m "Auto data update"
          git push